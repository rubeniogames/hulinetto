<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hockey Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ice: #e8f4f8;
      --ice-dark: #c5dde8;
      --rink: #0a1628;
      --rink-mid: #112240;
      --blue: #1565c0;
      --red: #c62828;
      --gold: #f9a825;
      --text: #0a1628;
      --muted: #546e7a;
      --card-bg: #ffffff;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--rink);
      color: var(--ice);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--rink);
      border-bottom: 3px solid var(--red);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 26px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-puck {
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-puck svg { width: 16px; height: 16px; }

    .logo-accent { color: var(--red); }

    .header-date {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ice-dark);
      opacity: 0.7;
    }

    /* ── Hero banner ── */
    .hero {
      background: linear-gradient(135deg, var(--rink-mid) 0%, #0d1f3c 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 40px 24px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 30px,
        rgba(255,255,255,0.015) 30px,
        rgba(255,255,255,0.015) 31px
      );
    }

    .hero-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(36px, 6vw, 64px);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1;
      color: #fff;
      position: relative;
    }

    .hero-sub {
      margin-top: 10px;
      font-size: 15px;
      color: var(--ice-dark);
      opacity: 0.7;
      position: relative;
    }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .section-count {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--rink-mid);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      cursor: default;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(198,40,40,0.5);
    }

    .card-tag-bar {
      padding: 12px 16px 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .tag-news  { background: rgba(198,40,40,0.2); color: #ef9a9a; }
    .tag-match { background: rgba(21,101,192,0.3); color: #90caf9; }
    .tag-transfer { background: rgba(249,168,37,0.2); color: #ffe082; }
    .tag-rumor { background: rgba(255,255,255,0.08); color: #b0bec5; }

    .card-time {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.05em;
    }

    .card-body {
      padding: 14px 16px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 19px;
      line-height: 1.25;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .card-text {
      font-size: 14px;
      line-height: 1.6;
      color: #90a4ae;
      flex: 1;
    }

    .card-source {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-source::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    /* ── Featured (first card) ── */
    .card.featured {
      grid-column: 1 / -1;
      flex-direction: row;
      max-height: 220px;
    }

    .card.featured .card-tag-bar { padding: 18px 20px 0; flex-direction: column; align-items: flex-start; gap: 4px; width: 50%; }
    .card.featured .card-body { padding: 14px 20px 20px; width: 50%; }
    .card.featured .card-title { font-size: 26px; }
    .card.featured .card-text { font-size: 15px; }

    @media (max-width: 600px) {
      .card.featured { flex-direction: column; max-height: none; }
      .card.featured .card-tag-bar,
      .card.featured .card-body { width: 100%; }
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }

    .empty-sub { font-size: 14px; opacity: 0.6; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
    .loading { animation: pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-puck">
        <svg viewBox="0 0 16 16" fill="none">
          <ellipse cx="8" cy="8" rx="7" ry="5" fill="#111"/>
          <ellipse cx="8" cy="8" rx="5" ry="3.5" fill="#222"/>
        </svg>
      </div>
      Hockey<span class="logo-accent">Feed</span>
    </div>
    <div class="header-date" id="header-date"></div>
  </div>
</header>

<div class="hero">
  <div class="hero-label">Хоккейные новости</div>
  <div class="hero-title">На льду и&nbsp;за&nbsp;бортом</div>
  <div class="hero-sub">Последние события — сгенерировано ИИ из репортажей команды</div>
</div>

<main>
  <div class="section-header">
    <span class="section-title">Лента новостей</span>
    <div class="section-line"></div>
    <span class="section-count" id="post-count"></span>
  </div>
  <div id="feed" class="cards-grid">
    <div class="loading">Загрузка постов…</div>
  </div>
</main>

<script>
  // Дата в шапке
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

  const TAG_LABELS = {
    news: { label: 'Новость', cls: 'tag-news' },
    match: { label: 'Матч', cls: 'tag-match' },
    transfer: { label: 'Трансфер', cls: 'tag-transfer' },
    rumor: { label: 'Слухи', cls: 'tag-rumor' },
  };

  function timeAgo(isoString) {
    const diff = Math.floor((Date.now() - new Date(isoString)) / 60000);
    if (diff < 1) return 'только что';
    if (diff < 60) return `${diff} мин назад`;
    const h = Math.floor(diff / 60);
    if (h < 24) return `${h} ч назад`;
    return `${Math.floor(h / 24)} д назад`;
  }

  function renderCard(post, index) {
    const tag = TAG_LABELS[post.tag] || TAG_LABELS.news;
    const featured = index === 0 ? 'featured' : '';
    return `
      <article class="card ${featured}">
        <div class="card-tag-bar">
          <span class="tag ${tag.cls}">${tag.label}</span>
          <span class="card-time">${timeAgo(post.created_at)}</span>
        </div>
        <div class="card-body">
          <h2 class="card-title">${escHtml(post.title)}</h2>
          <p class="card-text">${escHtml(post.body)}</p>
          <div class="card-source">Источник: ${escHtml(post.source || 'Telegram-канал команды')}</div>
        </div>
      </article>`;
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadPosts() {
    const feed = document.getElementById('feed');
    try {
      const res = await fetch('posts.json?v=' + Date.now());
      if (!res.ok) throw new Error('not found');
      const posts = await res.json();

      if (!posts.length) {
        feed.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <div class="empty-icon">🏒</div>
            <div class="empty-title">Постов пока нет</div>
            <div class="empty-sub">Напишите новость в Telegram-канал — она появится здесь автоматически</div>
          </div>`;
        return;
      }

      document.getElementById('post-count').textContent = posts.length + ' материалов';
      feed.innerHTML = posts
        .sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
        .map(renderCard)
        .join('');
    } catch {
      feed.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">🏒</div>
          <div class="empty-title">Постов пока нет</div>
          <div class="empty-sub">posts.json не найден — запустите скрипт генерации</div>
        </div>`;
    }
  }

  loadPosts();
</script>
</body>
</html>
