name: Generate & Deploy

on:
  # Запускать каждые 2 часа автоматически
  schedule:
    - cron: '0 */2 * * *'
  # Или вручную — кнопка "Run workflow" в GitHub
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Генерация постов из Telegram
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_posts.py

      - name: Сохранить обновлённый posts.json в репозиторий
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --staged --quiet || git commit -m "chore: update posts [skip ci]"
          git push

      - name: Загрузка сайта на GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Деплой на GitHub Pages
        uses: actions/deploy-pages@v4
